<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSOSO - Login</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #F5F5F5; color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }

    .login-container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 350px;
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #0B3D2E;
    }

    .login-container label {
      font-size: 12px;
      display: block;
      margin-bottom: 5px;
    }

    .login-container input[type="email"],
    .login-container input[type="password"],
    .login-container input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    .field-group {
      margin-bottom: 15px;
    }

    .password-field {
      position: relative;
    }

    .password-field input {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px 6px;
      z-index: 2;
      min-width: 32px;
      min-height: 32px;
    }

    .password-toggle svg {
      display: block;
      color: #333;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      font-size: 12px;
    }

    .checkbox-group input {
      margin-right: 8px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #0B3D2E;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-google {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #fff;
      color: #111;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .signup-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #0B3D2E;
      text-decoration: none;
    }

    .signup-link:hover {
      text-decoration: underline;
    }

    .hint {
      font-size: 11px;
      color: #666;
      margin: -5px 0 12px;
      line-height: 1.4;
    }

    .form-feedback {
      font-size: 13px;
      line-height: 1.4;
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
    }

    .form-feedback.error {
      background: #fdecea;
      color: #b42318;
      border: 1px solid #fecdca;
    }

    .form-feedback.success {
      background: #ecfdf3;
      color: #027a48;
      border: 1px solid #abefc6;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Connexion</h2>
    <form id="loginForm">
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="exemple@email.com" required autocomplete="email">
      </div>

      <div class="field-group">
        <label for="password">Mot de passe</label>
        <div class="password-field">
          <input type="password" id="password" placeholder="Votre mot de passe" required autocomplete="current-password">
          <button type="button" class="password-toggle" data-password-toggle="password" aria-label="Afficher le mot de passe"></button>
        </div>
      </div>

      <div class="field-group">
        <label for="companyName">Nom de la société</label>
        <input type="text" id="companyName" placeholder="Nom ou code société (optionnel)" maxlength="80" autocomplete="organization">
      </div>

      <div class="field-group">
        <label for="companyPassword">Mot de passe société</label>
        <div class="password-field">
          <input type="password" id="companyPassword" placeholder="Mot de passe société" autocomplete="off" required minlength="6">
          <button type="button" class="password-toggle" data-password-toggle="companyPassword" aria-label="Afficher le mot de passe société"></button>
        </div>
      </div>

      <p class="hint">Saisissez le nom et le mot de passe de votre société.</p>
      <p id="loginFeedback" class="form-feedback error" hidden aria-live="polite"></p>

      <div class="checkbox-group">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">Rester connecté</label>
      </div>

      <button type="submit" class="btn-primary">Se connecter</button>
      <button type="button" id="googleLoginBtn" class="btn-google">Continuer avec Google</button>
    </form>
    <a class="signup-link" href="signup.html">Créer un compte</a>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
