<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B3D2E">
<link rel="manifest" href="manifest.json">
<title>Dépenses — NSONO</title>
<link rel="stylesheet" href="css/finances.css">
<script src="js/ui.js" defer></script>
<script src="js/nav.js" defer></script>
<script src="js/pwa.js" defer></script>
</head>
<body>

<header>
  <h3>NSONO — Dépenses</h3>
  <div class="status" id="status">● Online</div>
</header>

<div class="container">
  <a class="back-link" href="finances.html">← Finances</a>
  <div id="debug" style="color:#c0392b;font-size:13px"></div>

  <div class="form-box">
    <h3>Nouvelle Dépense</h3>
    <div class="form-grid">
      <input type="text" id="label" placeholder="Libellé" maxlength="120">
      <select id="category">
        <option value="salary">Salaire</option>
        <option value="investment">Investissement</option>
        <option value="reinvestment">Réinvestissement</option>
        <option value="tax">Taxe</option>
        <option value="maintenance">Maintenance</option>
        <option value="rent">Loyer</option>
        <option value="other">Autre</option>
      </select>
      <input type="number" id="amount" placeholder="Montant" min="0" step="0.01">
      <select id="type">
        <option value="fixed">Fixe</option>
        <option value="variable">Variable</option>
      </select>
      <input type="text" id="relatedTo" placeholder="Lié à">
      <textarea id="note" placeholder="Note"></textarea>
    </div>
    <button type="button" class="btn" id="addExpenseBtn">Ajouter Dépense</button>
  </div>

  <div class="form-box filters-box">
    <h3>Filtres</h3>
    <div class="filters-grid">
      <div class="filter-group">
        <label for="filterCategory">Catégorie</label>
        <select id="filterCategory"></select>
      </div>
      <div class="filter-group">
        <label for="startDate">Date début</label>
        <input type="date" id="startDate">
      </div>
      <div class="filter-group">
        <label for="endDate">Date fin</label>
        <input type="date" id="endDate">
      </div>
      <div class="filter-group">
        <label for="searchInput">Recherche</label>
        <input type="text" id="searchInput" placeholder="Libellé, catégorie...">
      </div>
    </div>
    <div class="filters-actions">
      <button type="button" class="filter-btn" id="applyFirebaseFilter">Appliquer filtres</button>
    </div>
  </div>

  <div class="list" id="recordsList"></div>
</div>

<div id="expenseEditModal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <h3>Modifier Dépense</h3>
    <label for="expenseEditAmount">Montant</label>
    <input type="number" id="expenseEditAmount" min="0" step="0.01">
    <div class="modal-error" id="expenseEditError"></div>
    <div class="modal-actions">
      <button type="button" id="expenseEditSaveBtn" class="modal-save">Enregistrer</button>
      <button type="button" id="expenseEditCancelBtn" class="modal-cancel">Annuler</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item" data-page="index.html">🛒 Vente</a>
  <a href="products.html" class="nav-item" data-page="products.html">📦 Produits</a>
  <a href="purchases.html" class="nav-item" data-page="purchases.html">📥 Achats</a>
  <a href="finances.html" class="nav-item active" data-page="finances.html">💰 Finances</a>
  <a href="stats.html" class="nav-item" data-page="stats.html">📊 Stats</a>
</nav>

<script type="module" src="js/expenses.js"></script>
</body>
</html>
