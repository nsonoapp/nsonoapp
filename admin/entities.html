<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B3D2E">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' https://www.gstatic.com https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.gstatic.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; font-src 'self' https://fonts.gstatic.com; worker-src 'self' blob:; base-uri 'self'; form-action 'self';">
<link rel="manifest" href="../manifest.json">
<title>Entités — NSOSO Admin</title>
<link rel="stylesheet" href="../css/drawer.css">
<link rel="stylesheet" href="css/admin.css">
<script src="../js/ui.js" defer></script>
<script src="../js/nav.js" defer></script>
<script src="../js/pwa.js" defer></script>
</head>
<body>

<header>
  <h3>NSOSO — Entités</h3>
  <div class="status" id="status">● Online</div>
</header>

<div class="container">
  <a class="back-link" href="admin.html">← Administration</a>
  <div id="adminContextBanner"></div>
  <div id="adminDebug" style="font-size:13px"></div>

  <div class="form-box" id="createEntityBox">
    <h3>Nouvelle entité</h3>
    <div class="form-grid">
      <input type="text" id="entityName" placeholder="Nom (ex. Goma)" maxlength="80">
      <label for="entityAdminSelect">Admin entité *</label>
      <select id="entityAdminSelect" required>
        <option value="">Choisir un administrateur</option>
      </select>
      <input type="password" id="entityPassword" placeholder="Mot de passe entité (min. 6)" minlength="6" maxlength="64">
    </div>
    <button type="button" class="btn" id="createEntityBtn">Créer l'entité</button>
  </div>

  <div class="list" id="entitiesList"></div>
</div>

<div class="modal" id="entityEditModal" aria-hidden="true">
  <div class="modal-content">
    <h3 id="entityEditTitle">Modifier l'entité</h3>
    <input type="hidden" id="editEntityId">
    <label for="editEntityName">Nom</label>
    <input type="text" id="editEntityName" maxlength="80">
    <label for="editEntityAdminSelect">Admin entité *</label>
    <select id="editEntityAdminSelect" required>
      <option value="">Choisir un administrateur</option>
    </select>
    <label for="editEntityPassword">Nouveau mot de passe entité (laisser vide pour ne pas changer)</label>
    <input type="password" id="editEntityPassword" minlength="6" maxlength="64">
    <label for="editEntityPasswordConfirm">Confirmer mot de passe entité</label>
    <input type="password" id="editEntityPasswordConfirm" minlength="6" maxlength="64">
    <div class="modal-actions">
      <button type="button" class="btn" id="saveEntityEditBtn">Enregistrer</button>
      <button type="button" class="btn btn-secondary" id="closeEntityEditBtn">Annuler</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="../index.html" class="nav-item" data-page="index.html">🛒 Vente</a>
  <a href="../products.html" class="nav-item" data-page="products.html">📦 Produits</a>
  <a href="../index.html" class="nav-item" data-page="index.html">🛒 Vente</a>
  <a href="admin.html" class="nav-item active" data-page="admin.html">⚙️ Admin</a>
  <a href="../stats.html" class="nav-item" data-page="stats.html">📊 Stats</a>
</nav>

<script type="module" src="js/entities.js"></script>
</body>
</html>
