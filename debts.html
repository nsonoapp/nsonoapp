<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B3D2E">
<link rel="manifest" href="manifest.json">
<title>Dettes — NSONO</title>
<link rel="stylesheet" href="css/drawer.css">
<link rel="stylesheet" href="css/finances.css">
<script src="js/ui.js" defer></script>
<script src="js/nav.js" defer></script>
<script src="js/pwa.js" defer></script>
</head>
<body>

<header>
  <h3>NSONO — Dettes</h3>
  <div class="status" id="status">● Online</div>
</header>

<div class="container">
  <a class="back-link" href="finances.html">← Finances</a>
  <div id="debug" style="color:#c0392b;font-size:13px"></div>
  <div id="notificationBanner"></div>
  <div id="debtSummary" class="debt-summary" aria-live="polite"></div>

  <div class="form-box">
    <h3>Nouvelle Dette</h3>
    <div class="form-grid">
      <select id="debtType">
        <option value="client">Client</option>
        <option value="supplier">Fournisseur</option>
      </select>
      <input type="text" id="debtName" placeholder="Nom">
      <input type="text" inputmode="decimal" id="debtAmount" placeholder="Montant total" autocomplete="off">
      <input type="text" inputmode="decimal" id="debtPayed" placeholder="Montant payé (optionnel)" autocomplete="off">
      <input type="text" id="debtPhone" placeholder="Téléphone">
      <input type="date" id="debtDueDate">
      <textarea id="debtNote" placeholder="Note"></textarea>
    </div>
    <p style="font-size:12px;color:#666;margin:8px 0 0;">Échéance par défaut : J+7 si non renseignée.</p>
    <button type="button" class="btn" id="addDebtBtn">Créer Dette</button>
  </div>

  <div class="form-box filters-box">
    <h3>Filtres</h3>
    <div class="filters-grid">
      <div class="filter-group">
        <label for="filterStatus">Statut</label>
        <select id="filterStatus"></select>
      </div>
      <div class="filter-group">
        <label for="filterDebtType">Type</label>
        <select id="filterDebtType">
          <option value="all">Toutes</option>
          <option value="client">Clients</option>
          <option value="supplier">Fournisseurs</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="startDate">Date début</label>
        <input type="date" id="startDate">
      </div>
      <div class="filter-group">
        <label for="endDate">Date fin</label>
        <input type="date" id="endDate">
      </div>
      <div class="filter-group">
        <label for="searchInput">Recherche</label>
        <input type="text" id="searchInput" placeholder="Nom, téléphone...">
      </div>
    </div>
    <div class="filters-actions">
      <button type="button" class="filter-btn" id="applyFirebaseFilter">Appliquer filtres</button>
    </div>
  </div>

  <div class="list" id="recordsList"></div>
</div>

<div id="debtPaymentModal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <h3>Paiement Dette</h3>
    <label for="debtPaymentAmount">Montant payé</label>
    <input type="number" id="debtPaymentAmount" min="0.01" step="0.01">
    <div class="modal-error" id="debtPaymentError"></div>
    <div class="modal-actions">
      <button type="button" id="debtPaymentSaveBtn" class="modal-save">Valider</button>
      <button type="button" id="debtPaymentCancelBtn" class="modal-cancel">Annuler</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item" data-page="index.html">🛒 Vente</a>
  <a href="products.html" class="nav-item" data-page="products.html">📦 Produits</a>
  <a href="purchases.html" class="nav-item" data-page="purchases.html">📥 Achats</a>
  <a href="finances.html" class="nav-item active" data-page="finances.html">💰 Finances</a>
  <a href="stats.html" class="nav-item" data-page="stats.html">📊 Stats</a>
</nav>

<script type="module" src="js/debts.js"></script>
</body>
</html>
