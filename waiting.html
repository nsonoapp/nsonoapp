<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.firebaseio.com https://*.googleapis.com;">
  <title>NSOSO - Page d'attente</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      color: #111;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      padding: 24px;
      text-align: center;
    }
    .title {
      margin: 0 0 8px;
      color: #0B3D2E;
    }
    .text {
      margin: 0 0 16px;
      line-height: 1.5;
      font-size: 14px;
      color: #444;
    }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      color: #fff;
      background: #0B3D2E;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card" id="waitingCard">
    <h1 class="title">Page d'attente</h1>
    <p class="text">Votre compte est en attente d'approbation administrateur ou n'a pas encore un role autorise.</p>
    <button type="button" class="btn" id="logoutBtn">Se deconnecter</button>
  </main>
  <script type="module" src="js/waiting.js"></script>
</body>
</html>
